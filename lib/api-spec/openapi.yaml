openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Quantum Lounge Social API
servers:
  - url: /api
tags:
  - name: health
  - name: auth
  - name: lounge
  - name: guests
  - name: transactions
  - name: settings
  - name: messages
  - name: energy
  - name: teleport
  - name: vip
  - name: rentals
  - name: tips
  - name: oracle
  - name: sponsored
  - name: referrals
  - name: premium-messages
  - name: boosts

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: ownerLogin
      tags: [auth]
      summary: Owner login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: ownerLogout
      tags: [auth]
      summary: Owner logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get current auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /lounge/rooms:
    get:
      operationId: listRooms
      tags: [lounge]
      summary: List all lounge rooms
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [lounge]
      summary: Create a new lounge room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /lounge/rooms/{id}:
    get:
      operationId: getRoom
      tags: [lounge]
      summary: Get a single room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    put:
      operationId: updateRoom
      tags: [lounge]
      summary: Update a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    delete:
      operationId: deleteRoom
      tags: [lounge]
      summary: Delete a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /guests:
    get:
      operationId: listGuests
      tags: [guests]
      summary: List all guests
      responses:
        "200":
          description: List of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
    post:
      operationId: createGuest
      tags: [guests]
      summary: Check in a guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGuestBody"
      responses:
        "201":
          description: Guest checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}:
    get:
      operationId: getGuest
      tags: [guests]
      summary: Get guest details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    put:
      operationId: updateGuest
      tags: [guests]
      summary: Update guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuestBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    delete:
      operationId: deleteGuest
      tags: [guests]
      summary: Remove a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List secure quantum messages
      parameters:
        - name: roomId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a quantum-encrypted message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /energy/upgrades:
    get:
      operationId: listEnergyUpgrades
      tags: [energy]
      summary: List available quantum energy upgrades
      responses:
        "200":
          description: Upgrades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnergyUpgrade"
    post:
      operationId: createEnergyUpgrade
      tags: [energy]
      summary: Create an energy upgrade tier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnergyUpgradeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergyUpgrade"

  /energy/upgrades/{id}:
    delete:
      operationId: deleteEnergyUpgrade
      tags: [energy]
      summary: Delete an energy upgrade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /energy/guest-upgrades:
    get:
      operationId: listGuestUpgrades
      tags: [energy]
      summary: List all guest energy upgrade purchases
      responses:
        "200":
          description: Guest upgrades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuestUpgrade"
    post:
      operationId: purchaseUpgrade
      tags: [energy]
      summary: Guest purchases an energy upgrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseUpgradeBody"
      responses:
        "201":
          description: Purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestUpgrade"

  /teleport:
    post:
      operationId: teleportGuest
      tags: [teleport]
      summary: Teleport a guest between rooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeleportBody"
      responses:
        "200":
          description: Teleported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeleportResult"

  /teleport/history:
    get:
      operationId: listTeleportHistory
      tags: [teleport]
      summary: List teleport history
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeleportEvent"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /transactions/cashout:
    post:
      operationId: requestCashout
      tags: [transactions]
      summary: Owner requests a cashout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashoutBody"
      responses:
        "201":
          description: Cashout recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get lounge settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoungeSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update lounge settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoungeSettings"

  /stats/overview:
    get:
      operationId: getStats
      tags: [lounge]
      summary: Owner dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [lounge]
      summary: Top guests ranked by energy, upgrades, and teleports
      parameters:
        - name: includeAll
          in: query
          required: false
          schema:
            type: boolean
          description: When true, include checked-out guests in the leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /activity/recent:
    get:
      operationId: getRecentActivity
      tags: [lounge]
      summary: Recent activity feed (joins, teleports, purchases)
      responses:
        "200":
          description: Activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /memberships:
    get:
      operationId: listVipMemberships
      tags: [vip]
      summary: List all VIP memberships
      responses:
        "200":
          description: Memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VipMembership"
    post:
      operationId: createVipMembership
      tags: [vip]
      summary: Subscribe to VIP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVipMembershipBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipMembership"

  /memberships/{id}:
    get:
      operationId: getVipMembership
      tags: [vip]
      summary: Get a membership
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipMembership"
    put:
      operationId: updateVipMembership
      tags: [vip]
      summary: Update membership status
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VipMembership"
    delete:
      operationId: cancelVipMembership
      tags: [vip]
      summary: Cancel membership
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Cancelled

  /rentals:
    get:
      operationId: listRoomRentals
      tags: [rentals]
      summary: List all room rentals
      responses:
        "200":
          description: Rentals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoomRental"
    post:
      operationId: createRoomRental
      tags: [rentals]
      summary: Book a private room rental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRentalBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomRental"

  /rentals/{id}:
    put:
      operationId: updateRoomRental
      tags: [rentals]
      summary: Update a rental
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomRental"
    delete:
      operationId: deleteRoomRental
      tags: [rentals]
      summary: Cancel a rental
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /tips:
    get:
      operationId: listTips
      tags: [tips]
      summary: List all tips
      responses:
        "200":
          description: Tips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tip"
    post:
      operationId: createTip
      tags: [tips]
      summary: Send a tip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTipBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tip"

  /oracle/readings:
    get:
      operationId: listOracleReadings
      tags: [oracle]
      summary: List oracle readings
      responses:
        "200":
          description: Readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OracleReading"
    post:
      operationId: createOracleReading
      tags: [oracle]
      summary: Get a quantum oracle reading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOracleReadingBody"
      responses:
        "201":
          description: Reading generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OracleReading"

  /sponsored-rooms:
    get:
      operationId: listSponsoredRooms
      tags: [sponsored]
      summary: List sponsored rooms
      responses:
        "200":
          description: Sponsorships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SponsoredRoom"
    post:
      operationId: createSponsoredRoom
      tags: [sponsored]
      summary: Create a room sponsorship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSponsoredRoomBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsoredRoom"

  /sponsored-rooms/{id}:
    delete:
      operationId: deleteSponsoredRoom
      tags: [sponsored]
      summary: End a sponsorship
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Ended

  /referrals/codes:
    get:
      operationId: listReferralCodes
      tags: [referrals]
      summary: List referral codes
      responses:
        "200":
          description: Codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferralCode"
    post:
      operationId: createReferralCode
      tags: [referrals]
      summary: Create a referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferralCodeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralCode"

  /referrals/apply:
    post:
      operationId: applyReferralCode
      tags: [referrals]
      summary: Apply a referral code at check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReferralBody"
      responses:
        "200":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralResult"

  /premium-messages:
    get:
      operationId: listPremiumMessages
      tags: [premium-messages]
      summary: List premium messages
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PremiumMessage"
    post:
      operationId: sendPremiumMessage
      tags: [premium-messages]
      summary: Send a premium encrypted direct message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePremiumMessageBody"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PremiumMessage"

  /leaderboard-boosts:
    get:
      operationId: listLeaderboardBoosts
      tags: [boosts]
      summary: List active leaderboard boosts
      responses:
        "200":
          description: Boosts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardBoost"
    post:
      operationId: createLeaderboardBoost
      tags: [boosts]
      summary: Purchase a leaderboard boost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaderboardBoostBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardBoost"

  /leaderboard-boosts/{id}:
    delete:
      operationId: deleteLeaderboardBoost
      tags: [boosts]
      summary: Remove a boost
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /income/summary:
    get:
      operationId: getIncomeSummary
      tags: [vip]
      summary: Owner income breakdown across all revenue streams
      responses:
        "200":
          description: Income summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        password:
          type: string
      required: [password]

    AuthStatus:
      type: object
      properties:
        isOwner:
          type: boolean
        loungeName:
          type: string
          nullable: true
      required: [isOwner]

    Room:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        theme:
          type: string
        frequency:
          type: number
        capacity:
          type: integer
        guestCount:
          type: integer
        isOpen:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, theme, frequency, capacity, guestCount, isOpen, createdAt]

    CreateRoomBody:
      type: object
      properties:
        name:
          type: string
        theme:
          type: string
        frequency:
          type: number
        capacity:
          type: integer
        isOpen:
          type: boolean
      required: [name, theme, frequency, capacity]

    UpdateRoomBody:
      type: object
      properties:
        name:
          type: string
        theme:
          type: string
        frequency:
          type: number
        capacity:
          type: integer
        isOpen:
          type: boolean

    Guest:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        vibe:
          type: string
        energyLevel:
          type: string
          description: basic | charged | quantum | transcended
        roomId:
          type: integer
          nullable: true
        roomName:
          type: string
          nullable: true
        status:
          type: string
          description: active | checked_out
        feePaid:
          type: number
        checkedInAt:
          type: string
          format: date-time
        checkedOutAt:
          type: string
          format: date-time
          nullable: true
      required: [id, name, vibe, energyLevel, status, feePaid, checkedInAt]

    CreateGuestBody:
      type: object
      properties:
        name:
          type: string
        vibe:
          type: string
        roomId:
          type: integer
          nullable: true
      required: [name, vibe]

    UpdateGuestBody:
      type: object
      properties:
        status:
          type: string
        roomId:
          type: integer
          nullable: true
        vibe:
          type: string
        energyLevel:
          type: string

    Message:
      type: object
      properties:
        id:
          type: integer
        senderName:
          type: string
        content:
          type: string
          description: Quantum-encrypted message content
        roomId:
          type: integer
          nullable: true
        roomName:
          type: string
          nullable: true
        isEncrypted:
          type: boolean
        quantumSignature:
          type: string
          description: Unique quantum hash for message verification
        sentAt:
          type: string
          format: date-time
      required: [id, senderName, content, isEncrypted, quantumSignature, sentAt]

    SendMessageBody:
      type: object
      properties:
        senderName:
          type: string
        content:
          type: string
        roomId:
          type: integer
          nullable: true
      required: [senderName, content]

    EnergyUpgrade:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: e.g. Quantum Boost, Portal Ignition, Cosmic Transcendence
        level:
          type: string
          description: charged | quantum | transcended
        description:
          type: string
        price:
          type: number
        color:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, level, description, price, color, createdAt]

    CreateEnergyUpgradeBody:
      type: object
      properties:
        name:
          type: string
        level:
          type: string
        description:
          type: string
        price:
          type: number
        color:
          type: string
      required: [name, level, description, price, color]

    GuestUpgrade:
      type: object
      properties:
        id:
          type: integer
        guestId:
          type: integer
        guestName:
          type: string
        upgradeId:
          type: integer
        upgradeName:
          type: string
        level:
          type: string
        amountPaid:
          type: number
        purchasedAt:
          type: string
          format: date-time
      required: [id, guestId, guestName, upgradeId, upgradeName, level, amountPaid, purchasedAt]

    PurchaseUpgradeBody:
